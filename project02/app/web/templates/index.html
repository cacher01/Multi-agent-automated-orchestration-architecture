<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multi-Agent Orchestration Framework</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-pane" aria-label="任务聊天">
        <header class="chat-header">
          <div>
            <h1>Orchestrator</h1>
            <p>提交简单问答、工具任务或复杂编排任务。</p>
          </div>
          <span id="statusBadge" class="status-badge">Ready</span>
          <button id="newSessionButton" type="button" class="secondary-button">新会话</button>
        </header>

        <section id="chatHistory" class="chat-history" aria-live="polite">
          <article class="message assistant">
            <div class="message-meta">Main Agent</div>
            <div class="message-body">请输入任务或问题。</div>
          </article>
        </section>

        <form id="taskForm" class="composer">
          <textarea
            id="taskInput"
            name="input"
            rows="2"
            required
            placeholder="输入任务，例如：请设计一个三天 Python 学习计划；查询上海天气；现在北京时间几点"
          ></textarea>
          <div class="composer-actions">
            <label><input type="checkbox" id="persistLogs" /> 保存日志</label>
            <label><input type="checkbox" id="persistIntermediate" /> 保存中间结果</label>
            <button type="submit">发送</button>
          </div>
        </form>
      </section>

      <aside class="observer-pane" aria-label="任务观察器">
        <section class="observer-section">
          <div class="section-title">
            <h2>当前查看</h2>
            <span id="currentTaskLabel" class="muted">暂无任务</span>
          </div>
          <dl id="summary" class="summary">
            <dt>Status</dt>
            <dd>Ready</dd>
          </dl>
        </section>

        <section class="observer-section observer-grow">
          <h2>状态图</h2>
          <div id="stateTree" class="state-tree empty">暂无运行状态。</div>
        </section>

        <section class="observer-section">
          <h2>历史任务</h2>
          <div id="taskArchive" class="task-archive empty">暂无历史任务。</div>
        </section>

        <section id="memoryPanel" class="observer-section hidden">
          <h2>候选记忆</h2>
          <div id="memoryList" class="memory-list"></div>
        </section>
      </aside>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
