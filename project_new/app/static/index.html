<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orchestration Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="grid-overlay" aria-hidden="true"></div>

    <header class="app-header">
      <div style="display:flex; align-items:center;">
        <div class="brand">
          <span class="brand-mark">O</span>
          <div class="brand-meta">
            <span>Orchestration Workspace</span>
            <small>v2 · shannon-inspired</small>
          </div>
        </div>
        <nav class="app-nav" aria-label="primary">
          <a href="/" class="is-active" aria-current="page">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
            工作台
          </a>
          <a href="/ui/quota.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
            额度看板
          </a>
        </nav>
      </div>
      <div class="run-status">
        <span id="taskId" class="task-id-label">就绪</span>
        <strong id="taskStatus" data-state="idle">Idle</strong>
      </div>
    </header>

    <main class="workspace">
      <section class="primary-column">
        <form id="taskForm" class="task-composer">
          <div class="section-title">
            <div><span>任务输入</span></div>
            <span id="workflowLabel" class="workflow-label">自动路由</span>
          </div>
          <div class="session-bar">
            <label for="sessionSelect">对话</label>
            <select id="sessionSelect">
              <option value="">— 无对话（独立任务）—</option>
            </select>
            <button id="newSessionButton" type="button" class="secondary-button small">＋ 新建对话</button>
          </div>
          <label class="sr-only" for="questionInput">Task</label>
          <textarea id="questionInput" name="input" rows="6" placeholder="输入任务，例如：调研特斯拉公司并给出引用" required></textarea>
          <div class="composer-footer">
            <div class="prompt-list">
              <button type="button" data-prompt="查询北京天气和当地时间">🌤 天气 + 时间</button>
              <button type="button" data-prompt="调研特斯拉公司，概括业务、财务、竞争格局和近期动态，并给出引用">📚 调研报告</button>
              <button type="button" data-prompt="分析多智能体框架的发展趋势、代表项目、风险和适用场景">🔍 多角度分析</button>
              <button type="button" data-prompt="先调研特斯拉公司基本情况，再分析其竞争格局，最后生成风险报告">🔗 分步执行</button>
            </div>
            <div class="actions">
              <button id="cancelButton" class="secondary-button" type="button" disabled>取消</button>
              <button id="submitButton" class="primary-button" type="submit">提交任务</button>
            </div>
          </div>
        </form>

        <section class="result-panel">
          <div class="section-title result-title">
            <div><span>结果</span></div>
            <span id="confidenceLabel">置信度 --</span>
          </div>
          <article id="finalAnswer" class="answer empty">提交任务后，最终答案将显示在这里。</article>
          <section class="sources">
            <h3>引用来源</h3>
            <ul id="citations" class="citations empty"><li>暂无来源。</li></ul>
          </section>
          <section class="sources">
            <h3>产物文件</h3>
            <ul id="artifacts" class="citations empty"><li>暂无产物。</li></ul>
          </section>
          <details class="raw-details">
            <summary>原始数据</summary>
            <pre id="executionDetails">{}</pre>
          </details>
        </section>
      </section>

      <aside class="runtime-column">
        <section class="runtime-panel tree-panel">
          <div class="panel-heading">
            <div><span>执行图</span></div>
            <span id="eventCount">0</span>
          </div>
          <div id="treeEmpty" class="empty-state">提交任务后将在此展示执行流程。</div>
          <div id="executionTree" class="execution-tree" aria-live="polite"></div>
        </section>

        <section class="runtime-panel inspector-panel">
          <div class="panel-heading">
            <div><span>节点详情</span></div>
          </div>
          <pre id="selectedEvent">点击左侧执行图中的节点查看详情。</pre>
        </section>

        <section class="runtime-panel history-panel">
          <div class="panel-heading">
            <div><span>历史任务</span></div>
            <button id="refreshHistory" type="button">刷新</button>
          </div>
          <div id="taskHistory" class="task-history"></div>
        </section>

        <section class="runtime-panel session-panel">
          <div class="panel-heading">
            <div><span>对话记录</span></div>
            <span class="thread-hint" title="同一对话内的任务会自动注入上下文">↻ 上下文共享</span>
          </div>
          <div id="sessionTasks" class="task-history">
            <div class="empty-state">选择一个对话查看任务时间线。<br>点击任务可重放完整执行过程。</div>
          </div>
        </section>

        <details class="runtime-panel event-panel">
          <summary>事件时间线</summary>
          <ol id="eventStream" class="event-stream"></ol>
          <div id="eventPath" hidden></div>
        </details>
      </aside>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
